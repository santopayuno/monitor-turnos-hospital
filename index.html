<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Turnos - Hospital Perrupato</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #0369a1;
            --color-success: #16a34a;
            --color-warning: #eab308;
            --color-danger: #dc2626;
            --color-light: #f8fafc;
            --color-border: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--color-light);
            color: #1e293b;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            border-bottom: 1px solid var(--color-border);
            padding: 20px 0;
            margin-bottom: 30px;
            box-shadow: var(--shadow-sm);
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--color-primary);
            font-weight: 700;
        }

        .header-info {
            text-align: right;
            font-size: 0.9rem;
            color: #64748b;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-left: 4px solid var(--color-primary);
            padding: 20px;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.3s;
        }

        .stat-card:hover {
            box-shadow: var(--shadow-md);
        }

        .stat-card.success {
            border-left-color: var(--color-success);
        }

        .stat-card.warning {
            border-left-color: #2563eb;
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 8px;
        }

        .stat-card.success .stat-number {
            color: var(--color-success);
        }

        .stat-card.warning .stat-number {
            color: #2563eb;
        }

        .stat-subtitle {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--color-border);
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            color: #64748b;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--color-primary);
        }

        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .especialidades-list {
            background: white;
            border-radius: 8px;
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .especialidad {
            padding: 16px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .especialidad:hover {
            background: var(--color-light);
        }

        .especialidad:last-child {
            border-bottom: none;
        }

        .especialidad-info {
            flex: 1;
        }

        .especialidad-nombre {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .especialidad-cupos {
            font-size: 1.8rem;
            font-weight: 700;
            min-width: 80px;
            text-align: right;
            margin-left: 20px;
        }

        .especialidad.disponible {
            border-left: 4px solid var(--color-success);
        }

        .especialidad.disponible .especialidad-cupos {
            color: var(--color-success);
        }

        .especialidad.pocos {
            border-left: 4px solid var(--color-warning);
        }

        .especialidad.pocos .especialidad-cupos {
            color: var(--color-warning);
        }

        .especialidad.ultimos {
            border-left: 4px solid var(--color-danger);
        }

        .especialidad.ultimos .especialidad-cupos {
            color: var(--color-danger);
        }

        .especialidad.agotado {
            border-left: 4px solid #9ca3af;
            opacity: 0.7;
        }

        .no-data {
            padding: 40px 20px;
            text-align: center;
            color: #94a3b8;
        }

        .chart-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }

        footer {
            text-align: center;
            color: #94a3b8;
            margin-top: 40px;
            padding: 20px;
            font-size: 0.9rem;
            border-top: 1px solid var(--color-border);
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            header .container {
                flex-direction: column;
                gap: 10px;
            }

            .especialidad {
                flex-direction: column;
                align-items: flex-start;
            }

            .especialidad-cupos {
                width: 100%;
                text-align: left;
                margin-left: 0;
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <h1>🏥 Monitor de Turnos</h1>
        <div class="header-info">
            <div><strong>Hospital Alfredo I. Perrupato</strong></div>
            <div>Actualizado: <span id="fecha-actualizacion">Cargando...</span></div>
        </div>
    </div>
</header>

<main class="container">

    <div class="stats-grid">
        <div class="stat-card success">
            <h3>📊 Total Monitoreadas</h3>
            <div class="stat-number" id="total-especialidades">-</div>
            <div class="stat-subtitle">Especialidades</div>
        </div>

        <div class="stat-card success">
            <h3>🍀 Cupos Disponibles</h3>
            <div class="stat-number" id="total-cupos">-</div>
            <div class="stat-subtitle">Abiertos ahora</div>
        </div>

        <div class="stat-card warning">
            <h3>🔵 Especialidades Activas</h3>
            <div class="stat-number" id="especialidades-activas">-</div>
            <div class="stat-subtitle">Con turnos</div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="mostrarTab(event, 'nuevos')">🆕 Nuevos</button>
        <button class="tab-btn" onclick="mostrarTab(event, 'disponibles')">✅ Disponibles</button>
        <button class="tab-btn" onclick="mostrarTab(event, 'pocos')">🟡 Pocos Cupos</button>
        <button class="tab-btn" onclick="mostrarTab(event, 'ultimos')">⚠️ Últimos</button>
        <button class="tab-btn" onclick="mostrarTab(event, 'agotados')">‼️ Agotados</button>
        <button class="tab-btn" onclick="mostrarTab(event, 'graficos')">📊 Gráficos</button>
    </div>

    <div id="tab-nuevos" class="tab-content active">
        <div class="especialidades-list">
            <div id="lista-nuevos"></div>
        </div>
    </div>

    <div id="tab-disponibles" class="tab-content">
        <div class="especialidades-list">
            <div id="lista-disponibles"></div>
        </div>
    </div>

    <div id="tab-pocos" class="tab-content">
        <div class="especialidades-list">
            <div id="lista-pocos"></div>
        </div>
    </div>

    <div id="tab-ultimos" class="tab-content">
        <div class="especialidades-list">
            <div id="lista-ultimos"></div>
        </div>
    </div>

    <div id="tab-agotados" class="tab-content">
        <div class="especialidades-list">
            <div id="lista-agotados"></div>
        </div>
    </div>

</main>

<footer>
    ⏰ Se actualiza cada 5 minutos • 🤖 Monitor Profesional
</footer>

<script>

let estadoActual = {};
let estadisticas = { registros: {}, eventos: [] };

async function cargarDatos() {
    try {
        const res1 = await fetch('estado_turnos.json');
        if (res1.ok) estadoActual = await res1.json();

        const res2 = await fetch('estadisticas_db.json');
        if (res2.ok) estadisticas = await res2.json();

        actualizarDashboard();
    } catch (e) {
        console.error('Error cargando datos:', e);
    }
}

function mostrarTab(event, nombre) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + nombre).classList.add('active');
    event.target.classList.add('active');
}

function actualizarDashboard() {

    document.getElementById('fecha-actualizacion').textContent =
        new Date().toLocaleString('es-AR');

    const disponibles = Object.entries(estadoActual)
        .filter(([_, c]) => c >= 20);

    const pocos = Object.entries(estadoActual)
        .filter(([_, c]) => c >= 5 && c < 20);

    const ultimos = Object.entries(estadoActual)
        .filter(([_, c]) => c >= 1 && c < 5);

    const agotados = Object.entries(estadoActual)
        .filter(([_, c]) => c === 0);

    const hoy = new Date().toISOString().split('T')[0];

    // ELIMINAR DUPLICADOS EN NUEVOS
    const nuevosMap = new Map();

    (estadisticas.eventos || [])
        .filter(e => e.tipo === 'nuevos' && e.fecha.includes(hoy))
        .forEach(e => {
            nuevosMap.set(e.especialidad, e.cupos);
        });

    const nuevos = Array.from(nuevosMap.entries());

    const totalCupos = Object.values(estadoActual)
        .reduce((a, b) => a + b, 0);

    const conCupos = Object.values(estadoActual)
        .filter(c => c > 0).length;

    document.getElementById('total-especialidades').textContent =
        Object.keys(estadoActual).length;

    document.getElementById('total-cupos').textContent =
        totalCupos;

    document.getElementById('especialidades-activas').textContent =
        conCupos;

    nuevos.sort((a, b) => a[0].localeCompare(b[0]));
    disponibles.sort((a, b) => a[0].localeCompare(b[0]));
    pocos.sort((a, b) => a[0].localeCompare(b[0]));
    ultimos.sort((a, b) => a[0].localeCompare(b[0]));
    agotados.sort((a, b) => a[0].localeCompare(b[0]));

    renderList('lista-nuevos', nuevos, 'nuevo');
    renderList('lista-disponibles', disponibles, 'disponible');
    renderList('lista-pocos', pocos, 'pocos');
    renderList('lista-ultimos', ultimos, 'ultimos');
    renderList('lista-agotados', agotados, 'agotado');
}

function renderList(elementId, items, clase) {

    const el = document.getElementById(elementId);

    if (items.length === 0) {
        el.innerHTML = '<div class="no-data">No hay especialidades en esta categoría</div>';
        return;
    }

    el.innerHTML = items.map(([nombre, cupo]) => `
        <div class="especialidad ${clase}">
            <div class="especialidad-info">
                <div class="especialidad-nombre">🏥 ${nombre}</div>
            </div>
            <div class="especialidad-cupos">${cupo}</div>
        </div>
    `).join('');
}

cargarDatos();
setInterval(cargarDatos, 5 * 60 * 1000);

</script>

</body>
</html>
