# Publica el dashboard en GitHub Pages con un workflow propio.
# Ventajas frente a la compilación automática de Pages:
#  - No aplica el límite blando de 10 compilaciones por hora.
#  - El grupo "concurrency" evita los choques de deploy: si llega un push nuevo
#    mientras hay un deploy en curso, se cancela el viejo y gana el más nuevo.
name: Publicar dashboard en Pages

on:
  # Cada vez que el monitor sube datos (o cambia el index) a la rama main
  push:
    branches: ["main"]
  # Permite ejecutarlo a mano desde la pestaña Actions
  workflow_dispatch:

# Permisos mínimos que necesita el deploy de Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez. Un push nuevo reemplaza al que esté en curso,
# así un deploy trabado no bloquea a los siguientes (y no llegan mails de fallo).
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Traer el repo
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Empaquetar el sitio (index.html + los JSON del root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
