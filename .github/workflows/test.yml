name: Tests Automáticos

on:
  push:
    branches: [ main ]
    paths:
      - 'monitor.py'
      - 'run_monitor.py'
      - 'config.json'
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests --quiet

      - name: ✅ Verificar sintaxis monitor.py
        run: python -m py_compile monitor.py && echo "✓ Sintaxis OK"

      - name: ✅ Verificar sintaxis run_monitor.py
        run: python -m py_compile run_monitor.py && echo "✓ Sintaxis OK"

      - name: ✅ Verificar imports
        run: |
          python -c "
          import monitor
          print('✓ Imports OK')
          print('✓ ARCHIVOS:', list(monitor.ARCHIVOS.keys()))
          print('✓ CONFIG cargado:', bool(monitor.CONFIG is not None))
          "
        env:
          BOT_TOKEN: "test_token"
          CHAT_ID: "test_chat"

      - name: ✅ Verificar config.json
        run: |
          python -c "
          import json
          with open('config.json') as f:
              config = json.load(f)

          campos = [
            'especialidades_interes',
            'generar_reporte_diario',
            'hora_reporte_diario',
            'alertas_patrones'
          ]

          for campo in campos:
              assert campo in config, f'Campo faltante: {campo}'

          print('✓ config.json válido:', config)
          "

      - name: ✅ Verificar lógica de procesamiento
        run: |
          python -c "
          from monitor import ProcesadorEspecialidades, ConstructorMensajeTelegram, formato_cupos_disponibles
          from datetime import datetime
          from zoneinfo import ZoneInfo

          # Estado anterior simulado (persistido)
          estado_anterior = {'PEDIATRIA': 0, 'CARDIOLOGIA': 5}

          # API real simulada (FORMATO REAL)
          estado_nuevo_api = [
              {'descripcion': 'PEDIATRIA', 'cupo': 10, 'suspendido': False},
              {'descripcion': 'CARDIOLOGIA', 'cupo': 2, 'suspendido': False}
          ]

          proc = ProcesadorEspecialidades(estado_nuevo_api, estado_anterior).procesar()

          assert len(proc.cambios['nuevos']) == 1, 'Debería detectar 1 nuevo'
          assert proc.cambios['nuevos'][0]['nombre'] == 'PEDIATRIA'
          assert len(proc.cambios['ultimos']) == 1, 'Debería detectar últimos cupos'

          print('✓ ProcesadorEspecialidades OK')

          # Test constructor de mensaje
          ahora = datetime.now(ZoneInfo('America/Argentina/Mendoza'))
          fecha_hora = ahora.strftime('%d/%m • %H:%M hs')

          constructor = ConstructorMensajeTelegram(
              proc.cambios,
              proc.clasificacion,
              fecha_hora,
              proc.estado_actual,
              2
          )

          mensaje = constructor.construir()

          assert mensaje is not None, 'Mensaje no debería ser None'
          assert 'HOSPITAL PERRUPATO' in mensaje
          assert 'PEDIATRIA' in mensaje

          print('✓ ConstructorMensajeTelegram OK')
          print('✓ Mensaje generado correctamente')

          # Test formato cupos
          assert formato_cupos_disponibles(1) == '1 Cupo Disponible'
          assert formato_cupos_disponibles(5) == '5 Cupos Disponibles'
          print('✓ formato_cupos_disponibles OK')
          "
        env:
          BOT_TOKEN: "test_token"
          CHAT_ID: "test_chat"

      - name: ✅ Verificar heartbeat.json
        run: |
          python -c "
          import json, os

          if os.path.exists('heartbeat.json'):
              with open('heartbeat.json') as f:
                  hb = json.load(f)

              assert 'ultima_ejecucion' in hb, 'Campo ultima_ejecucion faltante'

              from datetime import datetime
              datetime.fromisoformat(hb['ultima_ejecucion'])

              print('✓ heartbeat.json válido:', hb['ultima_ejecucion'])
          else:
              print('⚠ heartbeat.json no existe aún (se crea en primera ejecución)')
          "

      - name: 📋 Resumen
        if: success()
        run: |
          echo "================================"
          echo "✅ Todos los tests pasaron"
          echo "================================"
          echo "• Sintaxis: OK"
          echo "• Imports: OK"
          echo "• config.json: OK"
          echo "• Lógica de procesamiento: OK"
          echo "• Heartbeat: OK"