name: Monitor de Turnos Hospital Perrupato

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar Monitor
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python monitor.py

      - name: Configurar Git
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

      - name: Commit si hay cambios
        run: |
          if git diff --quiet; then
            echo "ℹ️ Sin cambios"
            exit 0
          fi
          git add estado_turnos.json estadisticas_db.json logs/ || true
          git commit -m "Monitor: $(date +'%Y-%m-%d %H:%M:%S')" || true

      - name: Sincronizar y Push
        run: |
          git fetch origin main --quiet
          git rebase origin/main || git rebase --abort
          git push origin main --quiet || echo "Push falló, continuando..."