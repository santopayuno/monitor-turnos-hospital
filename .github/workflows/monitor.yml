name: Monitor de Turnos

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests urllib3

      - name: Crear config.json si no existe
        run: |
          if [ ! -f config.json ]; then
            cat > config.json << 'CONFIGEOF'
          {
            "especialidades_interes": [],
            "generar_reporte_diario": true,
            "hora_reporte_diario": "23:55"
          }
          CONFIGEOF
          fi

      - name: Ejecutar Monitor
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python monitor.py
        continue-on-error: true

      - name: Guardar logs
        if: always()
        run: |
          mkdir -p logs
          if [ -f monitor.log ]; then
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            cp monitor.log "logs/monitor_$TIMESTAMP.log"
            ls -1t logs/monitor_*.log 2>/dev/null | tail -n +51 | xargs -r rm 2>/dev/null || true
          fi

      - name: Commit cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          [ -f estado_turnos.json ] && git add estado_turnos.json || true
          [ -f estadisticas_db.json ] && git add estadisticas_db.json || true
          [ -f config.json ] && git add config.json || true
          [ -f index.html ] && git add index.html || true
          [ -f reporte_diario.txt ] && git add reporte_diario.txt || true
          [ -d logs/ ] && git add logs/ 2>/dev/null || true

          git commit -m "Actualizar estado $(date +%Y-%m-%d\ %H:%M:%S)" || echo "Sin cambios"
          
          git pull --rebase origin main || true
          git push

      - name: Mostrar resumen
        if: always()
        run: |
          echo "## Monitor de Turnos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f monitor.log ]; then
            echo "### Logs" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            tail -10 monitor.log >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi