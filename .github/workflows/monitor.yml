name: Despliegue del Dashboard Web

on:
  workflow_dispatch: # Permite que Railway despierte este proceso a la distancia
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'estado_turnos.json'
      - 'estadisticas_db.json'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-pantalla:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Repositorio
        uses: actions/checkout@v4

      - name: Configurar Entorno de GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir Contenido Estático
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Sube la raíz del proyecto (index.html y los JSON)

      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
